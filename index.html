    <head>
        <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <title>Segunda exp de RA usando o AR.js e o A-frame, hiro e imagem</title>
    </head>

    <body style="margin: 0px; overflow: hidden;">
        <a-scene embedded arjs = "debugUIEnabled: false" vr-mode="enabled : false">
            <a-marker preset="hiro">
            <a-image src="macaco2.jpg" position="0 0.5 0" rotation="-90 0 0" width="3" height="2"></a-image>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>

    </body>
