<html>
    <head>
        <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
        <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
        <title>Primeira exp de RA usando o AR.js e o A-frame</title>
    </head>

    <body style="margin: 0px; overflow: hidden;">
        <a-scene embedded arjs = "debugUIEnabled: false" vr-mode="enabled : false">
            <a-marker preset="hiro">
                <a-box position='0 1 0' material='color: purple;'></a-box>
                <a-assets>
                <img id="texture" src="texture.png">
                </a-assets>
                <!-- Basic cone. -->
                <a-cone color="green" radius-bottom="2" radius-top="0"></a-cone>
                <!-- Textured box. -->
                <a-cone src="#texture"></a-cone>
            </a-marker>
            <a-entity camera></a-entity>
        </a-scene>

    </body>
</html>
